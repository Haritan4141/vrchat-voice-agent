[audio.capture]
mode = "virtual_device"
input_device = "CABLE-A Output"
sample_rate = 16000
channels = 1
chunk_ms = 200
silence_timeout_ms = 900
rms_threshold = 500
min_speech_ms = 400
max_utterance_ms = 9000

[audio.output]
# Recommended A/B cable layout:
# - VRChat output      -> CABLE-A Input
# - Tool input_device  -> CABLE-A Output
# - Tool TTS output    -> CABLE-B Input
# - VRChat microphone  -> CABLE-B Output
tts_output_device = "CABLE-B Input"
monitor_output_device = ""

[stt]
backend = "faster_whisper"
model = "large-v3"
device = "cuda"
compute_type = "float16"
language = "ja"
timeout_sec = 20
beam_size = 5
vad_filter = true
vad_min_silence_ms = 500

[llm]
backend = "ollama"
# Ollama default:    http://127.0.0.1:11434
# LM Studio default: http://127.0.0.1:1234/v1
base_url = "http://127.0.0.1:11434"
model = "gemma3:12b"
temperature = 0.7
max_tokens = 120
timeout_sec = 60
system_prompt = """
あなたはVRChat内で自然に会話するローカル音声アシスタントです。
返答は短く、会話相手の話を優先して拾ってください。
聞き役を基本にしつつ、自然に会話に混ざってください。
"""

[tts]
backend = "voicevox"
base_url = "http://127.0.0.1:50021"
speaker = 3
speed_scale = 1.0
timeout_sec = 30

[conversation]
max_response_chars = 80
min_reply_interval_sec = 4
allow_topic_suggestions = true
pause_listening_while_speaking = true
